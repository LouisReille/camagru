<button class="popup-close-btn" onclick="closePopup()" aria-label="Close">×</button>

<div class="popup-header">
    <h2>Reset Password</h2>
</div>

<div class="popup-section">
    <form id="forgotForm" class="auth-form">
        <div class="form-group-compact">
            <label>Email</label>
            <input type="email" id="email" class="preference-input" value="{{emailValue}}" required placeholder="Enter your email">
        </div>
        <button type="submit" class="action-button primary">Send Reset Link</button>
    </form>
</div>

<div class="popup-section">
    <p style="text-align: center; margin: 0; color: #666; font-size: 0.9em;">
        <span class="link" onclick="showAuthForm('login')" style="color: #667eea; cursor: pointer; text-decoration: underline;">Back to Login</span>
    </p>
</div>
