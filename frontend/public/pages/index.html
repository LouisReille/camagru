<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camagru - Gallery</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <header>
    <h1><a href="/pages/index.html" onclick="if(window.location.pathname === '/pages/index.html' || window.location.pathname.endsWith('/index.html')) { event.preventDefault(); return false; }" style="color: inherit; text-decoration: none;">Camagru</a></h1>
    <div class="header-actions">
      <button id="logoutBtn" class="logout-btn" onclick="handleLogout()" style="display: none;">Logout</button>
      <button id="userMenuIcon">C</button>
    </div>
  </header>
  <script>(function() {
    try {
        const cachedUser = localStorage.getItem("camagru_user");
        if (cachedUser) {
            const user = JSON.parse(cachedUser);
            const icon = document.getElementById("userMenuIcon");
            const logoutBtn = document.getElementById("logoutBtn");
            if (icon && user.username) {
                icon.textContent = user.username.charAt(0).toUpperCase();
                icon.classList.add("logged-in");
            }
            if (logoutBtn) {
                logoutBtn.style.display = "block";
            }
        }
    } catch (e) {}
})();</script>

  <main>
    <div id="gallery"></div>
  </main>

  <footer>
    <p>&copy; 2025 Camagru</p>
  </footer>

  
  <div id="popupBackdrop" class="popup-backdrop" onclick="closePopup()"></div>

  
  <div id="rightPopup" class="popup-right"></div>

  
  <div id="commentsModal" class="comments-modal">
    <div class="comments-modal-content">
      <div class="comments-modal-header">
        <h2>Comments</h2>
        <button class="comments-close-btn" onclick="closeCommentsModal()">×</button>
      </div>
      <div class="comments-modal-body">
        <div id="commentsList" class="comments-list"></div>
        <div class="comments-add-section">
          <input type="text" id="commentsInput" placeholder="Add a comment..." />
          <button id="commentsSubmitBtn" onclick="submitCommentFromModal()">Post</button>
        </div>
      </div>
    </div>
  </div>

  
  <script src="/assets/js/config.js"></script>
  
  
  <script src="/assets/js/common/template-loader.js"></script>
  
  
  <script src="/assets/js/common/session-refresh.js"></script>
  
  
  <script src="/assets/js/common/user/state.js"></script>
  <script src="/assets/js/common/user/api.js"></script>
  <script src="/assets/js/common/utils/helpers.js"></script>
  <script src="/assets/js/common/validation/validators.js"></script>
  <script src="/assets/js/common/ui/popup.js"></script>
  
  
  <script src="/assets/js/common/auth/token.js"></script>
  <script src="/assets/js/auth/auth.js"></script>
  <script src="/assets/js/common/auth/forms.js"></script>
  
  
  <script src="/assets/js/common/user/settings.js"></script>
  <script src="/assets/js/common/user/profile.js"></script>
  <script src="/assets/js/common/user/actions.js"></script>
  
  
  <script src="/assets/js/common/messages.js"></script>
  <script src="/assets/js/common/menu.js"></script>
  
  
  <script src="/assets/js/gallery/gallery.js"></script>
  <script>document.addEventListener("DOMContentLoaded", async () => {
    await initHeaderMenu();
    const params = new URLSearchParams(window.location.search);
    if (params.get("login") === "true") {
        setTimeout(() => toggleAuthModal("login"), 500);
    } else if (params.get("register") === "true") {
        setTimeout(() => toggleAuthModal("register"), 500);
    }
});</script>
</body>
</html>
