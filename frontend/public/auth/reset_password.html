<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Camagru</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/pages/index.html" onclick="if(window.location.pathname === '/pages/index.html' || window.location.pathname.endsWith('/index.html')) { event.preventDefault(); return false; }" style="color: inherit; text-decoration: none;">Camagru</a></h1>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 200px);">
        <div class="reset-container" style="background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 40px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 107, 157, 0.2); max-width: 500px; text-align: center;">
    <div id="formContainer">
                <h2 style="color: #e2e8f0; margin-bottom: 30px; font-size: 1.8em; font-weight: 600;">Reset your password</h2>
                <form id="resetForm" style="text-align: left;">
                    <div class="form-group-compact" style="margin-bottom: 20px;">
                        <label for="password" style="display: block; margin-bottom: 8px; font-weight: bold; color: #cbd5e1; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px;">New Password</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="preference-input" required minlength="8" placeholder="Password (min. 8 chars, uppercase, lowercase, number, special)" style="width: 100%; padding: 12px; border: 1px solid rgba(255, 107, 157, 0.3); border-radius: 8px; font-size: 0.95em; transition: all 0.3s; background: rgba(30, 41, 59, 0.6); color: #e2e8f0; box-sizing: border-box; margin-bottom: 0; padding-right: 80px;">
                            <label style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 0.85em; color: #cbd5e1; user-select: none; display: flex; align-items: center;">
            <input type="checkbox" id="showPasswordReset" style="margin-right: 5px; cursor: pointer;" onchange="togglePasswordVisibilityReset()">
            Show
          </label>
        </div>
                        <div id="passwordMessage" class="field-message" style="margin-top: 6px; font-size: 0.85em; color: #cbd5e1;"></div>
                        <div id="passwordRequirements" style="font-size: 0.75em; color: #94a3b8; margin-top: 5px;">
          Requirements: 8+ characters, uppercase, lowercase, number, special character
                        </div>
        </div>
        
                    <div class="form-group-compact" style="margin-bottom: 30px;">
                        <label for="passwordConfirm" style="display: block; margin-bottom: 8px; font-weight: bold; color: #cbd5e1; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px;">Confirm Password</label>
                        <input type="password" id="passwordConfirm" class="preference-input" required minlength="8" placeholder="Confirm password" style="width: 100%; padding: 12px; border: 1px solid rgba(255, 107, 157, 0.3); border-radius: 8px; font-size: 0.95em; transition: all 0.3s; background: rgba(30, 41, 59, 0.6); color: #e2e8f0; box-sizing: border-box; margin-bottom: 0;">
                        <div id="passwordMatchMessage" class="field-message" style="margin-top: 6px; font-size: 0.85em; color: #cbd5e1;"></div>
                    </div>
                    
                    <button type="submit" class="action-button primary" style="width: 100%; padding: 14px 20px; background: linear-gradient(135deg, #FF6B9D 0%, #FF8E9B 100%); color: white; border: none; border-radius: 10px; font-size: 0.95em; font-weight: 500; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);">Reset Password</button>
      </form>
      <div id="message"></div>
    </div>
  </div>
    </main>

    <footer>
        <p>&copy; 2025 Camagru</p>
    </footer>

    
    <div id="popupBackdrop" class="popup-backdrop" onclick="closePopup()"></div>

    
    <div id="rightPopup" class="popup-right"></div>

  
  <script src="/assets/js/config.js"></script>
  
  
  <script src="/assets/js/common/auth/token.js"></script>
  
  
  <script src="/assets/js/common/template-loader.js"></script>
  
  
  <script src="/assets/js/common/user/state.js"></script>
  <script src="/assets/js/common/validation/validators.js"></script>
  
  
  <script src="/assets/js/auth/reset_password.js?v=2"></script>
</body>
</html>
